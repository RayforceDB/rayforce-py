name: Build and publish wheels

on:
  push:
    tags:
      # Stable: X.Y.Z. Major version selects the core: 1.x.x → v1, 2.x.x → v2.
      - '[0-9]+.[0-9]+.[0-9]+'
      # Pre-release per PEP 440: 2.0.0a1, 2.0.0b1, 2.0.0rc1 — always v2 core.
      - '[0-9]+.[0-9]+.[0-9]+a[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+b[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
          - os: macos-14
            platform: macos
            arch: arm64

    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Resolve core repo from tag
        # Major version of the tag selects which Rayforce C core to clone:
        #   1.x.x[*]   → rayforce.git   (v1 core, stable 1.0.x line)
        #   2.x.x[*]   → rayforce2.git  (v2 core, alpha/beta/rc/GA of 2.x line)
        # Anything else fails the build loudly so we don't ship a wheel built
        # against the wrong core.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR="${TAG%%.*}"
          case "$MAJOR" in
            1)
              echo "RAYFORCE_GITHUB=https://github.com/RayforceDB/rayforce.git"  >> "$GITHUB_ENV"
              echo "RELEASE_TRACK=stable-1.x"                                    >> "$GITHUB_ENV"
              ;;
            2)
              echo "RAYFORCE_GITHUB=https://github.com/RayforceDB/rayforce2.git" >> "$GITHUB_ENV"
              echo "RELEASE_TRACK=2.x"                                           >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported major version '$MAJOR' (tag '$TAG'). Only 1.x.x and 2.x.x are recognized."
              exit 1
              ;;
          esac
          echo "Tag '$TAG' (major $MAJOR) → core repo will be cloned from \$RAYFORCE_GITHUB"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel

      - name: Cache cibuildwheel
        uses: actions/cache@v4
        with:
          path: .cibw
          key: cibw-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('pyproject.toml', 'setup.cfg', 'setup.py', 'requirements*.txt') }}
          restore-keys: |
            cibw-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_ARCHS: "auto64"
          CIBW_BEFORE_BUILD: "bash {project}/scripts/prepare_build.sh"
          CIBW_TEST_SKIP: "*"
          CIBW_ENVIRONMENT: "RAYFORCE_GITHUB=${{ env.RAYFORCE_GITHUB }}"
          CIBW_MACOS_ENVIRONMENT: "MACOSX_DEPLOYMENT_TARGET=11.0"
          CIBW_CACHE_PATH: ".cibw"
          CIBW_MANYLINUX_X86_64_IMAGE: "quay.io/pypa/manylinux_2_28_x86_64:latest"
          CIBW_BEFORE_ALL_LINUX: "yum install -y git gcc clang gcc-c++ make"

        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            cibuildwheel --platform linux --archs x86_64 --output-dir wheelhouse
          else
            cibuildwheel --platform macos --archs arm64 --output-dir wheelhouse
          fi

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
          retention-days: 1

  test_wheels:
    name: Test wheels on ${{ matrix.os }} Python ${{ matrix.python-version }}
    needs: build_wheels
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: '3.11'
            platform: linux
            arch: x86_64
          - os: ubuntu-22.04
            python-version: '3.12'
            platform: linux
            arch: x86_64
          - os: ubuntu-22.04
            python-version: '3.13'
            platform: linux
            arch: x86_64
          - os: ubuntu-22.04
            python-version: '3.14'
            platform: linux
            arch: x86_64
          - os: macos-14
            python-version: '3.11'
            platform: macos
            arch: arm64
          - os: macos-14
            python-version: '3.12'
            platform: macos
            arch: arm64
          - os: macos-14
            python-version: '3.13'
            platform: macos
            arch: arm64
          - os: macos-14
            python-version: '3.14'
            platform: macos
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Verify AVX2 support (required for rayforce)
        if: runner.os == 'Linux'
        run: |
          echo "Checking CPU features..."
          if grep -q avx2 /proc/cpuinfo; then
            echo "AVX2 supported"
          else
            echo "::error::This runner does not support AVX2 instructions required by rayforce"
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}-${{ matrix.arch }}
          path: wheels

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout websockets pandas>=2.0.0 polars>=0.19.0 pyarrow sqlglot

      - name: Remove local rayforce package to force pip installation
        run: |
          # Remove local rayforce directory to ensure we test against installed wheel
          rm -rf rayforce/__pycache__
          rm -rf rayforce/*.so rayforce/*.dylib rayforce/*.dll
          rm -rf rayforce/plugins/*.so rayforce/plugins/*.dylib rayforce/plugins/*.dll
          # Move rayforce directory out of Python path temporarily
          if [ -d "rayforce" ]; then
            mv rayforce rayforce.local
          fi

      - name: Install and test wheel
        run: |
          PYVER=$(echo '${{ matrix.python-version }}' | tr -d '.')
          WHEEL_FILE=$(find wheels -name "*cp${PYVER}*.whl" | head -1)
          if [ -z "$WHEEL_FILE" ]; then
            echo "Error: No wheel file found for Python ${{ matrix.python-version }}"
            find wheels -name "*.whl" || echo "No wheel files found"
            exit 1
          fi
          echo "Installing wheel: $WHEEL_FILE"
          pip install "$WHEEL_FILE" --force-reinstall --no-deps
          python -m pytest -m "" -x -vv --durations=20 tests/

  publish:
    name: Publish to PyPI
    needs: test_wheels
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/rayforce-py

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: Prepare distribution directory
        run: |
          mkdir -p dist
          find wheels -name "*.whl" -exec cp {} dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Announce release on Zulip
        if: success()
        env:
          ZULIP_BOT_TOKEN: ${{ secrets.ZULIP_RELEASES_BOT_TOKEN }}
        run: |
          chmod +x scripts/announce-release.sh
          ./scripts/announce-release.sh "${{ steps.version.outputs.version }}" "${{ secrets.ZULIP_RELEASES_BOT_TOKEN }}"
