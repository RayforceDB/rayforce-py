name: Coverage

on:
  push:
    branches: [master, rayforce2]

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Resolve core repo from branch
        # master → v1 core (stable 1.0.x line); rayforce2 → v2 core (2.x line).
        run: |
          case "$GITHUB_REF_NAME" in
            master)
              echo "RAYFORCE_GITHUB=https://github.com/RayforceDB/rayforce.git"  >> "$GITHUB_ENV"
              ;;
            rayforce2)
              echo "RAYFORCE_GITHUB=https://github.com/RayforceDB/rayforce2.git" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Coverage workflow not configured for branch '$GITHUB_REF_NAME'"
              exit 1
              ;;
          esac
          echo "Branch '$GITHUB_REF_NAME' → \$RAYFORCE_GITHUB"

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git gcc clang g++ make

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel setuptools-scm

      - name: Build rayforce binaries
        run: make app

      - name: Install test dependencies
        run: |
          pip install -e ".[dev,test-plugins]"

      - name: Run tests with coverage
        run: |
          python -m pytest -m "" -x -vv --durations=20 --cov=rayforce --cov-report=term-missing --cov-report=xml --cov-report=html tests/

      - name: Coverage Report
        run: |
          python -m coverage report
          echo "Coverage HTML report generated in htmlcov/index.html"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30
