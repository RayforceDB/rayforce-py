name: Coverage

on:
  push:
    branches: [master, windows-build]

jobs:
  coverage:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            runs_on: macos-14
          - name: Ubuntu (x86_64)
            runs_on: ubuntu-latest
          - name: Windows (x86_64)
            runs_on: windows-latest

    env:
      RAYFORCE_GITHUB: "https://github.com/RayforceDB/rayforce.git"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      # Linux deps
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git gcc g++ make clang

      # macOS deps
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install git make llvm

      # Windows deps: MSYS2 + MinGW toolchain (make, gcc, etc.)
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-toolchain

      - name: Install build dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel setuptools-scm

      # Build on Unix
      - name: Build rayforce binaries (macOS, Linux)
        if: runner.os != 'Windows'
        run: make app

      # Build on Windows under MSYS2 shell
      - name: Build rayforce binaries (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export PATH="/c/hostedtoolcache/windows/Python/3.14.*/x64:$PATH"
          make app

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio coverage "pandas>=2.0.0" "polars>=0.19.0" websockets pyarrow

      - name: Run tests with coverage
        run: |
          python -m pytest -x -vv --cov=rayforce --cov-report=term-missing --cov-report=xml --cov-report=html tests/

      - name: Coverage Report
        run: |
          python -m coverage report
          echo "Coverage HTML report generated in htmlcov/index.html"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ runner.os }}
          path: htmlcov/
          retention-days: 30
